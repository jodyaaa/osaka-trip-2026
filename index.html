<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오사카 가족여행 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg: #f7f6f3;
  --card: #ffffff;
  --border: #e5e3dc;
  --border-light: #eeece6;
  --text: #1a1a18;
  --text2: #5a5850;
  --text3: #9a9890;
  --accent: #2563eb;
  --accent-bg: #eff6ff;
  --red: #dc2626; --red-bg: #fef2f2;
  --green: #16a34a; --green-bg: #f0fdf4;
  --amber: #d97706; --amber-bg: #fffbeb;
  --purple: #7c3aed; --purple-bg: #f5f3ff;
  --pink: #db2777; --pink-bg: #fdf2f8;
  --teal: #0d9488; --teal-bg: #f0fdfa;
  --font: -apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif;
  --radius: 14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;-webkit-tap-highlight-color:transparent;}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(247,246,243,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
.nav-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:4px;overflow-x:auto;scrollbar-width:none;padding:10px 16px;}
.nav-inner::-webkit-scrollbar{display:none;}
.nb{flex-shrink:0;padding:6px 13px;border-radius:20px;border:1px solid var(--border);font-size:12px;cursor:pointer;background:transparent;color:var(--text2);transition:all .15s;white-space:nowrap;font-family:var(--font);}
.nb.on{background:var(--text);color:#fff;border-color:var(--text);}
.nb:hover:not(.on){background:var(--border-light);}

/* HERO */
.hero{background:var(--text);color:#fff;padding:40px 16px 32px;}
.hero-inner{max-width:960px;margin:0 auto;}
.hero h1{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px;}
.hero p{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:18px;}
.flight-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fc{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:13px 15px;}
.fc-label{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.fc-route{font-size:15px;font-weight:600;margin-bottom:3px;}
.fc-time{font-size:12px;color:rgba(255,255,255,.6);}
.fc-no{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px;}

/* MAIN */
.main{max-width:960px;margin:0 auto;padding:20px 16px 80px;}
.panel{display:none;}
.panel.on{display:block;}

/* SECTION */
.sec{margin-bottom:22px;}
.sec-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:11px;padding-left:2px;}

/* DAY HEADER */
.day-hd{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px;padding:16px 18px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);}
.day-num{font-size:30px;font-weight:700;line-height:1;flex-shrink:0;}
.day-info{flex:1;}
.day-title{font-size:16px;font-weight:600;line-height:1.3;margin-bottom:4px;}
.day-sub{font-size:12px;color:var(--text2);margin-bottom:8px;}
.day-badges{display:flex;gap:5px;flex-wrap:wrap;}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;}
.b-usj{background:#fef3c7;color:#92400e;}
.b-osaka{background:#dbeafe;color:#1e40af;}
.b-shop{background:#f3e8ff;color:#6b21a8;}
.b-ryokan{background:#dcfce7;color:#166534;}
.b-nara{background:#fef9c3;color:#854d0e;}
.b-transit{background:#f1f5f9;color:#475569;}
.b-new{background:#fce7f3;color:#9d174d;}
.b-shinsekai{background:#fff7ed;color:#9a3412;}

/* TIMELINE */
.timeline{position:relative;}
.timeline::before{content:'';position:absolute;left:56px;top:0;bottom:0;width:1px;background:var(--border);}
.tl-item{display:flex;position:relative;}
.tl-time{width:48px;text-align:right;font-size:11px;color:var(--text3);padding-top:15px;flex-shrink:0;padding-right:8px;line-height:1.3;}
.tl-dot-wrap{width:18px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;}
.tl-dot{width:9px;height:9px;border-radius:50%;margin-top:19px;z-index:1;}
.dot-move{background:#94a3b8;} .dot-food{background:#f59e0b;} .dot-sight{background:#3b82f6;} .dot-hotel{background:#22c55e;} .dot-shop{background:#a855f7;} .dot-tip{background:#ec4899;}
.tl-content{flex:1;padding:10px 0 13px 12px;border-bottom:1px solid var(--border-light);}
.tl-item:last-child .tl-content{border-bottom:none;}
.tl-head{display:flex;align-items:flex-start;gap:8px;}
.tl-title{font-size:14px;font-weight:500;line-height:1.4;flex:1;}
.tl-actions{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity .15s;}
.tl-item:hover .tl-actions{opacity:1;}
.tl-desc{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.6;}
.tl-tip{font-size:11px;color:#92400e;background:#fef3c7;border-radius:6px;padding:4px 8px;margin-top:5px;display:inline-block;line-height:1.5;}
.add-row{display:flex;justify-content:center;margin-top:10px;}
.btn-add-item{font-size:12px;color:var(--accent);border:1px dashed #bfdbfe;background:var(--accent-bg);padding:6px 16px;border-radius:20px;cursor:pointer;font-family:var(--font);transition:all .15s;}
.btn-add-item:hover{background:#dbeafe;}

/* RESTAURANT CARDS */
.r-grid{display:grid;gap:11px;}
.r-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 15px;}
.r-card.featured{border-color:#f59e0b;}
.r-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:7px;}
.r-emoji{font-size:22px;line-height:1;flex-shrink:0;}
.r-info{flex:1;}
.r-name{font-size:14px;font-weight:600;margin-bottom:3px;}
.r-tags{display:flex;gap:4px;flex-wrap:wrap;}
.r-tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;}
.tag-menu{background:var(--accent-bg);color:var(--accent);}
.tag-wait{background:var(--red-bg);color:var(--red);}
.tag-nowait{background:var(--green-bg);color:var(--green);}
.tag-res{background:var(--teal-bg);color:var(--teal);}
.tag-nores{background:var(--amber-bg);color:var(--amber);}
.tag-michelin{background:#fdf2f8;color:#9d174d;}
.tag-insta{background:var(--purple-bg);color:var(--purple);}
.r-menu-txt{font-size:13px;font-weight:500;margin:6px 0 3px;}
.r-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:7px;}
.r-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.r-map{font-size:11px;color:var(--accent);text-decoration:none;border:1px solid #bfdbfe;padding:3px 9px;border-radius:8px;}
.r-hours{font-size:11px;color:var(--text3);}
.r-review{margin-top:8px;padding:7px 10px;background:var(--bg);border-radius:8px;border-left:2px solid var(--border);}
.r-review-label{font-size:10px;color:var(--text3);margin-bottom:2px;font-weight:500;}
.r-review-text{font-size:12px;color:var(--text2);line-height:1.6;font-style:italic;}
.reel-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--pink);background:var(--pink-bg);padding:2px 7px;border-radius:8px;margin-left:4px;font-weight:500;}
.r-visited-badge{font-size:10px;background:var(--green-bg);color:var(--green);padding:2px 7px;border-radius:10px;font-weight:500;}

/* OVERVIEW */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:9px;margin-bottom:20px;}
.ov-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 13px;cursor:pointer;transition:all .15s;}
.ov-card:hover{border-color:var(--accent);}
.ov-day{font-size:10px;color:var(--text3);margin-bottom:1px;font-weight:500;text-transform:uppercase;}
.ov-date{font-size:13px;font-weight:600;margin-bottom:3px;}
.ov-theme{font-size:11px;color:var(--text2);line-height:1.4;}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;padding:10px 13px;background:var(--card);border:1px solid var(--border);border-radius:10px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.stat-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:9px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;}
.stat-val{font-size:22px;font-weight:700;}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px;}

/* BUDGET */
.exr-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 15px;margin-bottom:16px;}
.exr-bar-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.exr-live-badge{font-size:10px;padding:2px 7px;border-radius:6px;background:var(--green-bg);color:var(--green);font-weight:600;}
.exr-fail-badge{font-size:10px;padding:2px 7px;border-radius:6px;background:var(--red-bg);color:var(--red);font-weight:500;}
.exr-rows{display:flex;gap:12px;flex-wrap:wrap;}
.exr-row{display:flex;align-items:center;gap:7px;}
.exr-flag{font-size:16px;line-height:1;}
.exr-label{font-size:12px;font-weight:500;}
.exr-input{width:80px;border:1px solid var(--border);border-radius:8px;padding:5px 9px;font-size:13px;font-family:var(--font);}
.exr-unit{font-size:12px;color:var(--text3);white-space:nowrap;}
.exr-actions{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
.exr-refresh{font-size:12px;padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;font-family:var(--font);color:var(--accent);display:flex;align-items:center;gap:4px;transition:all .15s;}
.exr-refresh:hover{background:var(--accent-bg);}
.exr-refresh.loading{opacity:.6;pointer-events:none;}
.exr-status{font-size:11px;color:var(--text3);}
.amt-preview{font-size:12px;color:var(--accent);margin-top:4px;min-height:16px;font-weight:500;}
.budget-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px;margin-bottom:18px;}
.bs-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;}
.bs-val{font-size:20px;font-weight:700;}
.bs-label{font-size:11px;color:var(--text3);margin-top:2px;}
.bs-card.highlight{background:var(--accent);color:#fff;border-color:var(--accent);}
.bs-card.highlight .bs-label{color:rgba(255,255,255,.6);}
.expense-table{width:100%;border-collapse:collapse;font-size:13px;}
.expense-table th{background:var(--bg);font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;text-align:left;border-bottom:2px solid var(--border);}
.expense-table td{padding:9px 10px;border-bottom:1px solid var(--border-light);vertical-align:middle;}
.expense-table tr:last-child td{border-bottom:none;}
.expense-table tr:hover td{background:#fafaf8;}
.cat-pill{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap;}
.cat-항공{background:#dbeafe;color:#1e40af;} .cat-숙소{background:#dcfce7;color:#166534;} .cat-교통{background:#f1f5f9;color:#475569;} .cat-식비{background:#fef3c7;color:#92400e;} .cat-입장료{background:#f5f3ff;color:#6b21a8;} .cat-쇼핑{background:#fdf2f8;color:#9d174d;} .cat-기타{background:#f7f6f3;color:#5a5850;}
.paid-toggle{cursor:pointer;user-select:none;font-size:18px;}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;overflow-x:auto;margin-bottom:18px;}
.tbl-header{display:flex;align-items:center;justify-content:space-between;padding:13px 15px 0;}
.tbl-title{font-size:13px;font-weight:600;}
.del-btn{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text3);padding:2px;line-height:1;}
.del-btn:hover{color:var(--red);}
.edit-btn{background:none;border:none;cursor:pointer;font-size:14px;color:var(--text3);padding:2px;line-height:1;}
.edit-btn:hover{color:var(--accent);}

/* CHECKLIST */
.ck-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.ck-header{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;border-bottom:1px solid var(--border-light);cursor:pointer;}
.ck-cat{font-size:13px;font-weight:600;}
.ck-progress{font-size:11px;color:var(--text3);}
.ck-progress-bar{height:3px;background:var(--border);border-radius:2px;margin:0 15px 12px;}
.ck-progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s;}
.ck-item{display:flex;align-items:center;gap:10px;padding:10px 15px;border-bottom:1px solid var(--border-light);}
.ck-item:last-of-type{border-bottom:none;}
.ck-cb{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.ck-cb.done{background:var(--green);border-color:var(--green);}
.ck-cb.done::after{content:'✓';color:#fff;font-size:11px;font-weight:700;}
.ck-text{flex:1;font-size:13px;transition:all .15s;}
.ck-text.done{color:var(--text3);text-decoration:line-through;}
.ck-priority{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;flex-shrink:0;}
.pri-필수{background:var(--red-bg);color:var(--red);}
.pri-권장{background:var(--amber-bg);color:var(--amber);}
.pri-선택{background:var(--green-bg);color:var(--green);}
.ck-add-row{padding:10px 15px;display:flex;gap:8px;}
.ck-add-input{flex:1;border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px;font-family:var(--font);}
.ck-add-btn{padding:6px 12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--font);}

/* RESTAURANT LIST */
.r-search-bar{display:flex;gap:8px;margin-bottom:12px;}
.r-search-input{flex:1;border:1px solid var(--border);border-radius:24px;padding:9px 16px;font-size:13px;font-family:var(--font);background:var(--card);}
.r-search-input:focus{outline:none;border-color:var(--accent);}
.r-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.r-filter{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-family:var(--font);transition:all .15s;}
.r-filter.on{background:var(--text);color:#fff;border-color:var(--text);}
.r-filter:hover:not(.on){background:var(--border-light);}
.r-card-actions{display:flex;gap:5px;margin-top:8px;}
.visit-btn{font-size:11px;padding:4px 10px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;font-family:var(--font);color:var(--text2);transition:all .15s;}
.visit-btn.visited{background:var(--green-bg);color:var(--green);border-color:#86efac;}
.visit-btn:hover:not(.visited){background:var(--border-light);}
.r-del-btn{font-size:11px;padding:4px 10px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;font-family:var(--font);color:var(--text3);transition:all .15s;}
.r-del-btn:hover{color:var(--red);border-color:var(--red);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.on{display:flex;}
.modal{background:#fff;border-radius:20px;padding:22px 20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px;}
.form-row{margin-bottom:13px;}
.form-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;display:block;}
.form-input,.form-select,.form-textarea{width:100%;border:1px solid var(--border);border-radius:9px;padding:8px 11px;font-size:13px;font-family:var(--font);background:#fff;}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--accent);}
.form-textarea{resize:vertical;min-height:70px;}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px;}
.modal-actions{display:flex;gap:8px;margin-top:4px;}
.btn-primary{flex:1;padding:10px;background:var(--text);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font);}
.btn-secondary{padding:10px 16px;background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:10px;font-size:14px;cursor:pointer;font-family:var(--font);}
.btn-primary:hover{background:#333;}
.btn-secondary:hover{background:var(--border-light);}

/* FAB */
.fab{position:fixed;bottom:24px;right:20px;z-index:200;background:var(--text);color:#fff;border:none;border-radius:28px;padding:12px 20px;font-size:14px;font-weight:500;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.18);font-family:var(--font);display:flex;align-items:center;gap:6px;}
.fab:hover{background:#333;}
.fab-hidden{display:none;}

/* TRANSPORT GUIDE */
.tg-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:0;}
.tg-steps{margin:12px 0 8px;}
.tg-step{display:flex;gap:0;}
.tg-spine{display:flex;flex-direction:column;align-items:center;width:22px;flex-shrink:0;}
.tg-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--border);background:#fff;flex-shrink:0;z-index:1;margin-top:3px;}
.tg-dot.first{background:var(--green);border-color:var(--green);}
.tg-dot.last{background:var(--red);border-color:var(--red);}
.tg-vline{width:2px;background:var(--border);flex:1;min-height:16px;margin:2px 0;}
.tg-body{flex:1;padding-bottom:0;}
.tg-place{font-size:13px;font-weight:600;color:var(--text);padding-top:1px;line-height:1.4;}
.tg-place-note{font-size:11px;color:var(--text3);margin-top:1px;margin-bottom:2px;}
.tg-transit{display:flex;align-items:flex-start;gap:8px;padding:7px 0;}
.tg-line-pill{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;color:#fff;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;line-height:1.4;}
.tg-transit-detail{flex:1;}
.tg-transit-meta{font-size:11px;color:var(--text2);line-height:1.5;}
.tg-transit-tip{font-size:11px;color:#92400e;background:#fef3c7;border-radius:5px;padding:2px 7px;margin-top:3px;display:inline-block;line-height:1.5;}
.tg-tips-box{margin-top:10px;padding:10px 12px;background:var(--accent-bg);border-radius:9px;border-left:3px solid var(--accent);}
.tg-tips-title{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.tg-tips-li{font-size:12px;color:var(--text2);line-height:1.65;display:flex;gap:5px;margin-bottom:2px;}
.tg-tips-li::before{content:'•';color:var(--accent);flex-shrink:0;}
.tg-total-bar{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;padding:9px 12px;background:var(--bg);border-radius:9px;font-size:11px;color:var(--text2);}
.tg-total-item{display:flex;align-items:center;gap:4px;}
.tg-total-label{font-weight:600;color:var(--text);}

/* MAP */
.day-map-wrap{border-radius:var(--radius);overflow:hidden;margin-bottom:18px;border:1px solid var(--border);position:relative;}
.day-map-wrap .leaflet-container{font-family:var(--font);}
.map-legend{position:absolute;bottom:10px;left:10px;z-index:500;background:rgba(255,255,255,.93);border-radius:10px;padding:7px 10px;font-size:11px;display:flex;flex-direction:column;gap:4px;box-shadow:0 2px 8px rgba(0,0,0,.12);}
.map-legend-item{display:flex;align-items:center;gap:5px;}
.map-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* TIMELINE MAP LINK */

function renderTransportGuide(dayId) {
  const g = TRANSPORT_GUIDE[dayId];
  if (!g) return '';
  let num = 0;
  const totalSteps = g.steps.length;
  const stepsHtml = g.steps.map((s, i) => {
    const isLast = i === totalSteps - 1;
    if (s.place !== undefined) {
      num++;
      const isFirst = num === 1;
      const dotCls = isFirst ? 'first' : isLast ? 'last' : '';
      return `
      <div class="tg-step">
        <div class="tg-spine">
          <div class="tg-dot ${dotCls}"></div>
          ${!isLast ? '<div class="tg-vline"></div>' : ''}
        </div>
        <div class="tg-body" style="padding-bottom:${isLast?'0':'10px'};">
          <div class="tg-place">${s.place}</div>
          ${s.note ? `<div class="tg-place-note">${s.note}</div>` : ''}
        </div>
      </div>`;
    } else if (s.transit) {
      const t = s.transit;
      return `
      <div class="tg-step">
        <div class="tg-spine" style="padding-top:4px;">
          <div class="tg-vline" style="min-height:12px;"></div>
          <div class="tg-vline" style="min-height:12px;"></div>
        </div>
        <div class="tg-transit">
          <span class="tg-line-pill" style="background:${t.color};">${t.icon} ${t.line}</span>
          <div class="tg-transit-detail">
            <div class="tg-transit-meta">${t.detail}</div>
            ${t.tip ? `<div class="tg-transit-tip">💡 ${t.tip}</div>` : ''}
          </div>
        </div>
      </div>`;
    }
    return '';
  }).join('');
  const tipsHtml = g.tips?.length ? `
  <div class="tg-tips-box">
    <div class="tg-tips-title">교통 꿀팁</div>
    ${g.tips.map(t=>`<div class="tg-tips-li">${t}</div>`).join('')}
  </div>` : '';
  const totalHtml = g.total ? `
  <div class="tg-total-bar">
    <div class="tg-total-item">⏱ <span class="tg-total-label">총 이동시간</span> ${g.total.time}</div>
    <div class="tg-total-item">💴 <span class="tg-total-label">교통비</span> ${g.total.cost}</div>
  </div>` : '';
  return `
  <div class="sec">
    <div class="sec-title">교통 안내</div>
    <div class="tg-wrap">
      <div style="font-size:13px;font-weight:700;margin-bottom:4px;">${g.title}</div>
      ${totalHtml}
      <div class="tg-steps">${stepsHtml}</div>
      ${tipsHtml}
    </div>
  </div>`;
}

let state = {};

const DATA_VERSION = 6; // 모든 일정 호텔 출발 + 조식/중식/석식 완비

// 구글 지도 URL에서 좌표 추출 (@lat,lng 패턴)
function extractCoordsFromUrl(url) {
  if (!url) return null;
  const m = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return [parseFloat(m[1]), parseFloat(m[2])];
  const q = url.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (q) return [parseFloat(q[1]), parseFloat(q[2])];
  return null;
}

function loadState() {
  try {
    const saved = localStorage.getItem('osaka2026');
    if (saved) {
      state = JSON.parse(saved);
      if (!state.version || state.version < DATA_VERSION) {
        migrateRestaurantUrls();
        migrateBudgetV5();
        if (!state.version || state.version < 6) {
          // 일정 대폭 변경 (호텔 출발 + 조식/중식/석식 완비) — 일정만 시드 초기화
          state.schedule = JSON.parse(JSON.stringify(SEED_SCHEDULE));
        }
        state.version = DATA_VERSION;
        saveState();
      }
    } else {
      resetToSeed();
    }
  } catch(e) { resetToSeed(); }
}

function migrateRestaurantUrls() {
  if (!state.restaurants) return;
  state.restaurants = state.restaurants.map(r => {
    const seed = SEED_RESTAURANTS.find(s => s.id === r.id);
    if (seed && seed.mapUrl) return {...r, mapUrl: seed.mapUrl};
    return r;
  });
}

function migrateBudgetV5() {
  if (!state.budget) return;
  if (!state.budget.usdRate) state.budget.usdRate = 1350;
  if (!state.budget.rateUpdated) state.budget.rateUpdated = null;
  const jpy = state.budget.exchangeRate || 9.5;
  // 사전 예약 항목 마이그레이션
  if (state.budget.preset) {
    state.budget.preset = state.budget.preset.map(e => {
      if (e.currency) return e; // 이미 변환됨
      // 구버전: amountKrw만 있음 → KRW 항목으로 처리
      return {...e, currency:'KRW', amountOrig: e.amountKrw||0, rateAtSave: null};
    });
  }
  // 현지 지출 항목 마이그레이션
  if (state.budget.daily) {
    state.budget.daily = state.budget.daily.map(e => {
      if (e.currency) return e;
      // 구버전: amountJpy만 있음 → JPY 항목으로 처리
      const orig = parseFloat(e.amountJpy) || 0;
      return {...e, currency:'JPY', amountOrig: orig, rateAtSave: jpy, amountKrw: Math.round(orig * jpy)};
    });
  }
}

function resetToSeed() {
  state = {
    version: DATA_VERSION,
    schedule: JSON.parse(JSON.stringify(SEED_SCHEDULE)),
    restaurants: JSON.parse(JSON.stringify(SEED_RESTAURANTS)),
    budget: JSON.parse(JSON.stringify(SEED_BUDGET)),
    checklist: JSON.parse(JSON.stringify(SEED_CHECKLIST)),
  };
  saveState();
}

function saveState() {
  localStorage.setItem('osaka2026', JSON.stringify(state));
}

let currentMap = null;

function initDayMap(dayId) {
  if (currentMap) { try { currentMap.remove(); } catch(e){} currentMap = null; }
  const el = document.getElementById('day-map');
  if (!el) return;

  // ── 좌표 소스: state.schedule 우선, 없으면 DAY_MAP_DATA로 보완 ──
  const items = (state.schedule[dayId] || {}).items || [];
  const seedLocs = (DAY_MAP_DATA[dayId] || {}).locs || [];

  const locs = items.map(item => {
    // 항목에 직접 저장된 좌표가 있으면 사용
    if (item.lat && item.lng) {
      return { n:item.title, c:[item.lat, item.lng], t:item.type, time:item.time, mapUrl:item.mapUrl };
    }
    // 없으면 DAY_MAP_DATA에서 같은 시간대 항목으로 보완
    const seed = seedLocs.find(s => s.time === item.time);
    if (seed) return { ...seed, mapUrl:item.mapUrl };
    return null;
  }).filter(Boolean);

  if (locs.length === 0) return;

  const map = L.map('day-map', {zoomControl:true, scrollWheelZoom:false, attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
    subdomains:'abcd', maxZoom:20
  }).addTo(map);

  const allCoords = [];
  const nameGmUrl = name => `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name)}`;
  const popupBtn = url =>
    `<a href="${url}" target="_blank" style="display:inline-block;margin-top:6px;padding:4px 10px;background:#2563eb;color:#fff;border-radius:6px;font-size:11px;text-decoration:none;font-weight:500;">📍 구글 지도 열기</a>`;

  // 호텔 마커
  L.marker(HOTEL.coords, {icon: L.divIcon({
    className:'',
    html:`<div style="background:#22c55e;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.25);">🏨</div>`,
    iconSize:[30,30], iconAnchor:[15,15]
  })}).bindPopup(`<b>${HOTEL.name}</b><br><small>숙소</small>${popupBtn(nameGmUrl(HOTEL.name))}`).addTo(map);

  // 일정 마커 (state.schedule 기반)
  locs.forEach((loc, i) => {
    const col = TYPE_COLORS[loc.t] || '#3b82f6';
    L.marker(loc.c, {icon: L.divIcon({
      className:'',
      html:`<div style="background:${col};color:#fff;width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.25);">${i+1}</div>`,
      iconSize:[27,27], iconAnchor:[13,13]
    })}).bindPopup(
      `<b>${i+1}. ${loc.n}</b>${loc.time?'<br><small style="color:#888">'+loc.time+'</small>':''}` +
      popupBtn(loc.mapUrl || nameGmUrl(loc.n))
    ).addTo(map);
    allCoords.push(loc.c);
  });

  // 경로선 + 방향 화살표
  if (allCoords.length > 1) {
    L.polyline(allCoords, {color:'#2563eb', weight:3, opacity:.75, dashArray:'8,5'}).addTo(map);
    for (let i = 0; i < allCoords.length - 1; i++) {
      const mid = [(allCoords[i][0]+allCoords[i+1][0])/2, (allCoords[i][1]+allCoords[i+1][1])/2];
      const angle = Math.atan2(allCoords[i+1][1]-allCoords[i][1], allCoords[i+1][0]-allCoords[i][0]) * 180 / Math.PI - 90;
      L.marker(mid, {icon: L.divIcon({
        className:'',
        html:`<div style="transform:rotate(${angle}deg);color:#2563eb;font-size:14px;line-height:1;">▲</div>`,
        iconSize:[14,14], iconAnchor:[7,7]
      }), interactive:false}).addTo(map);
    }
  }

  const bounds = L.latLngBounds([HOTEL.coords, ...allCoords]);
  map.fitBounds(bounds, {padding:[36,36]});
  currentMap = map;
}

function getMealType(timeStr) {
  if (!timeStr) return null;
  const h = parseInt(timeStr.split(':')[0], 10);
  if (h < 10) return 'breakfast';
  if (h < 15) return 'lunch';
  return 'dinner';
}

const MEAL_LABELS = {breakfast:'🌅 아침 식사 추천 3곳', lunch:'☀️ 점심 식사 추천 3곳', dinner:'🌙 저녁 식사 추천 3곳'};

function renderMealAccordion(recs, mealType) {
  if (!recs || !recs.length) return '';
  const label = MEAL_LABELS[mealType] || '맛집 추천';
  const recsHtml = recs.map(r => `
    <div class="meal-rec">
      <div class="meal-rec-header">
        <div class="meal-rec-name">${r.name}</div>
        <div class="meal-rec-rating">${r.rating} <span class="meal-rec-reviews">(${r.reviews})</span></div>
      </div>
      <div class="meal-rec-tags">${r.tags.map(t=>`<span class="r-tag tag-menu">${t}</span>`).join('')}</div>
      <div class="meal-rec-menu">${r.menu}</div>
      <div class="meal-rec-meta">⏰ ${r.hours} · 📍 ${r.area}</div>
      <div class="meal-rec-links">
        <a class="meal-rec-link map" href="${r.mapUrl}" target="_blank">📍 구글 지도</a>
        <a class="meal-rec-link review" href="https://search.naver.com/search.naver?query=${encodeURIComponent(r.name)}&nso=so:r,p:1y" target="_blank">📝 네이버 후기</a>
      </div>
    </div>`).join('');
  return `
  <details class="meal-acc">
    <summary>${label}</summary>
    <div class="meal-acc-body">${recsHtml}</div>
  </details>`;
}

function renderTimelineItem(dayId, item, idx) {
  const typeMap = {move:'dot-move',food:'dot-food',sight:'dot-sight',hotel:'dot-hotel',shop:'dot-shop',tip:'dot-tip'};
  const placeName = item.title.split(/[·→(]/)[0].trim();
  const mapSearchUrl = item.mapUrl ||
    `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(placeName + ' 오사카')}`;
  const noMap = !placeName || (item.type === 'hotel' && placeName.includes('복귀'));

  // 이동 항목: 교통 배지
  let transitBadge = '';
  if (item.type === 'move') {
    const tr = ITEM_TRANSIT[`${dayId}_${item.time}`];
    if (tr) {
      transitBadge = `
      <div class="tl-transit-badge">
        <span class="tl-transit-pill" style="background:${tr.color};">${tr.icon} ${tr.line}</span>
        <div>
          <div class="tl-transit-meta">${tr.detail}</div>
          ${tr.tip ? `<div class="tl-transit-tip">💡 ${tr.tip}</div>` : ''}
        </div>
      </div>`;
    }
  }

  // 식사 항목: 맛집 아코디언
  let mealAccordion = '';
  if (item.type === 'food') {
    const mt = getMealType(item.time);
    const recs = mt && MEAL_RECS[dayId] && MEAL_RECS[dayId][mt];
    if (recs) mealAccordion = renderMealAccordion(recs, mt);
  }

  return `
  <div class="tl-item" id="tl-${dayId}-${idx}">
    <div class="tl-time">${item.time||''}</div>
    <div class="tl-dot-wrap"><div class="tl-dot ${typeMap[item.type]||'dot-sight'}"></div></div>
    <div class="tl-content">
      <div class="tl-head">
        <div class="tl-title">${item.title}${!noMap ? ` <a class="tl-map-link" href="${mapSearchUrl}" target="_blank">📍 지도</a>` : ''}</div>
        <div class="tl-actions">
          <button class="btn-icon" onclick="showEditTimelineModal('${dayId}',${idx})" title="편집">✏️</button>
          <button class="btn-icon" onclick="deleteTimelineItem('${dayId}',${idx})" title="삭제">🗑️</button>
        </div>
      </div>
      ${item.desc ? `<div class="tl-desc">${item.desc}</div>` : ''}
      ${item.tip ? `<div class="tl-tip">💡 ${item.tip}</div>` : ''}
      ${transitBadge}
      ${mealAccordion}
    </div>
  </div>`;
}

function deleteTimelineItem(dayId, idx) {
  if (!confirm('이 일정 항목을 삭제할까요?')) return;
  state.schedule[dayId].items.splice(idx, 1);
  saveState();
  renderMain();
}

async function fetchRates() {
  const btn = document.getElementById('exr-refresh-btn');
  const statusEl = document.querySelector('.exr-bar-title');
  if (btn) { btn.classList.add('loading'); btn.textContent = '⏳ 조회 중...'; }
  // file:// 호환 CDN API 시도 (1차 → 2차 fallback)
  const URLS = [
    'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/krw.json',
    'https://latest.currency-api.pages.dev/v1/currencies/krw.json',
  ];
  for (const url of URLS) {
    try {
      const res = await fetch(url);
      if (!res.ok) continue;
      const data = await res.json();
      const rates = data.krw;
      if (!rates || !rates.jpy || !rates.usd) continue;
      // 원/엔 = 1 / (엔/원 = rates.jpy)  →  rates.jpy 는 1원당 엔화
      state.budget.exchangeRate = Math.round((1 / rates.jpy) * 100) / 100;
      state.budget.usdRate = Math.round(1 / rates.usd);
      state.budget.rateUpdated = new Date().toISOString();
      saveState();
      renderMain();
      return;
    } catch(e) { /* 다음 URL 시도 */ }
  }
  // 모든 URL 실패
  if (btn) { btn.classList.remove('loading'); btn.textContent = '🔄 실시간 업데이트'; }
  if (statusEl) {
    const errSpan = statusEl.querySelector('.exr-err');
    if (!errSpan) {
      const s = document.createElement('span');
      s.className = 'exr-fail-badge exr-err';
      s.textContent = '조회 실패 — 수동 입력 사용';
      statusEl.appendChild(s);
    }
  }
}

function fmtAmountCell(e) {
  const krw = e.amountKrw || 0;
  if (!e.currency || e.currency === 'KRW') {
    return `<span style="font-weight:500">${krw.toLocaleString()}원</span>`;
  }
  const sym = e.currency === 'JPY' ? '¥' : '$';
  const orig = (parseFloat(e.amountOrig)||0).toLocaleString();
  const rate = e.rateAtSave;
  const rateTip = rate ? `<div style="font-size:10px;color:var(--text3);margin-top:1px">${e.currency==='JPY'?rate+'원/엔':rate+'원/$'} 기준</div>` : '';
  return `<div style="font-weight:500">${sym}${orig} → ${krw.toLocaleString()}원</div>${rateTip}`;
}

function updateAmtPreview() {
  const cur = document.getElementById('f-currency')?.value || 'KRW';
  const amt = parseFloat(document.getElementById('f-amtval')?.value) || 0;
  const el = document.getElementById('f-amt-preview');
  if (!el) return;
  if (!amt || cur === 'KRW') { el.textContent = ''; return; }
  let rate, sym, krw;
  if (cur === 'JPY') { rate = state.budget.exchangeRate; sym = '엔'; krw = Math.round(amt * rate); }
  else { rate = state.budget.usdRate; sym = '달러'; krw = Math.round(amt * rate); }
  el.textContent = `≈ ${krw.toLocaleString()}원  (1${sym} = ${rate}원 기준 · 저장 시점 환율로 확정)`;
}

    return `<span class="r-tag ${cls}">${t}</span>`;
  }).join('');

  // 네이버 블로그 후기 (최근 1년)
  const naverReviewUrl = `https://search.naver.com/search.naver?where=blog&query=${encodeURIComponent(r.name + ' 오사카')}&nso=so:r,p:1y`;
  // 예약 가능 여부
  const canReserve = r.tags.some(t => t.includes('예약 가능') || t.includes('예약 권장'));
  // 타베로그 예약 검색
  const reserveUrl = `https://tabelog.com/rstLst/?vs=2&sa=${encodeURIComponent(r.name)}`;
  // 구글 지도 URL (mapUrl 없으면 이름 검색으로 대체)
  const mapLink = r.mapUrl || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.name + ' ' + r.area)}`;

  return `
  <div class="r-card ${r.featured?'featured':''}" id="rcard-${r.id}">
    <div class="r-head">
      <div class="r-emoji">${r.emoji||'🍴'}</div>
      <div class="r-info">
        <div class="r-name">${r.name}${r.reel?'<span class="reel-badge">릴스 추천</span>':''}</div>
        <div class="r-tags">
          ${!inDay ? `<span class="tag-day">${r.day} · ${r.area}</span>` : ''}
          ${tagHtml}
          ${r.visited ? '<span class="r-visited-badge">✓ 방문완료</span>' : ''}
        </div>
      </div>
    </div>
    ${r.menu ? `<div class="r-menu-txt">${r.menu}</div>` : ''}
    ${r.desc ? `<div class="r-desc">${r.desc}</div>` : ''}
    <div class="r-meta">
      ${r.hours ? `<span class="r-hours">🕐 ${r.hours}</span>` : ''}
    </div>
    ${r.review ? `
    <div class="r-review">
      <div class="r-review-label">후기 미리보기</div>
      <div class="r-review-text">"${r.review}"</div>
    </div>` : ''}
    <div class="r-link-row">

      <a class="r-link-btn review" href="${naverReviewUrl}" target="_blank">🟢 네이버 후기 (최근 1년)</a>
      ${canReserve ? `<a class="r-link-btn reserve" href="${reserveUrl}" target="_blank">📅 타베로그 예약</a>` : ''}
    </div>
    <div class="r-card-actions">
      <button class="visit-btn ${r.visited?'visited':''}" onclick="toggleVisited('${r.id}')">${r.visited?'✓ 방문완료':'방문 체크'}</button>
      <button class="visit-btn" onclick="showEditRestaurantModal('${r.id}')">편집</button>
      <button class="r-del-btn" onclick="deleteRestaurant('${r.id}')">삭제</button>
    </div>
  </div>`;

  state.restaurants = state.restaurants.filter(r=>r.id!==id);

  renderMain();
}

  return `
  <div class="form-row"><label class="form-label">날짜</label>
    <select class="form-select" id="f-day">
      ${days.map(d=>`<option value="${d}" ${e.day===d?'selected':''}>${d}</option>`).join('')}
    </select></div>
  <div class="form-row"><label class="form-label">카테고리</label>
    <select class="form-select" id="f-cat">
      ${cats.map(c=>`<option value="${c}" ${e.category===c?'selected':''}>${c}</option>`).join('')}
    </select></div>
  <div class="form-row"><label class="form-label">내용 *</label>
    <input class="form-input" id="f-name" placeholder="예: 타코야키" value="${e.name||''}" /></div>
  <div class="form-row-2">
    <div class="form-row" style="margin:0"><label class="form-label">통화</label>
      <select class="form-select" id="f-currency" onchange="updateAmtPreview()">
        <option value="JPY" ${cur==='JPY'?'selected':''}>엔 (JPY)</option>
        <option value="USD" ${cur==='USD'?'selected':''}>달러 (USD)</option>
      </select></div>
    <div class="form-row" style="margin:0"><label class="form-label">금액</label>
      <input class="form-input" id="f-amtval" type="number" placeholder="0" value="${orig}" oninput="updateAmtPreview()" /></div>
  </div>
  <div class="amt-preview" id="f-amt-preview"></div>
  <div class="form-row"><label class="form-label">메모</label>
    <input class="form-input" id="f-notes" placeholder="메모" value="${e.notes||''}" /></div>
  `;
}

// RESTAURANT MODAL
function showAddRestaurantModal(defaultDay) {
  modalMode = 'addRestaurant'; modalContext = {defaultDay};
  showModal('식당 추가', restaurantForm({day:defaultDay||'D1'}));
}
function showEditRestaurantModal(id) {
  modalMode = 'editRestaurant'; modalContext = {id};
  const r = state.restaurants.find(r=>r.id===id);
  showModal('식당 편집', restaurantForm(r));
}
function restaurantForm(r) {
  const days = ['D1','D2','D3','D4','D5','D6','D7','D8'];
  const areas = ['도톤보리/난바','신사이바시','우메다/나카츠','신세카이/텐노지','오사카성','덴포잔','나라','기타'];
  return `
  <div class="form-row-2">
    <div class="form-row" style="margin:0"><label class="form-label">날짜</label>
      <select class="form-select" id="f-rday">
        ${days.map(d=>`<option value="${d}" ${r.day===d?'selected':''}>${d}</option>`).join('')}
      </select></div>
    <div class="form-row" style="margin:0"><label class="form-label">이모지</label>
      <input class="form-input" id="f-emoji" maxlength="2" value="${r.emoji||'🍴'}" /></div>
  </div>
  <div class="form-row"><label class="form-label">식당 이름 *</label>
    <input class="form-input" id="f-rname" placeholder="식당 이름" value="${r.name||''}" /></div>
  <div class="form-row"><label class="form-label">지역</label>
    <select class="form-select" id="f-rarea">
      ${areas.map(a=>`<option value="${a}" ${r.area===a?'selected':''}>${a}</option>`).join('')}
    </select></div>
  <div class="form-row"><label class="form-label">대표 메뉴</label>
    <input class="form-input" id="f-menu" placeholder="대표 메뉴 설명" value="${r.menu||''}" /></div>
  <div class="form-row"><label class="form-label">설명</label>
    <textarea class="form-textarea" id="f-rdesc">${r.desc||''}</textarea></div>
  <div class="form-row"><label class="form-label">영업시간</label>
    <input class="form-input" id="f-hours" placeholder="11:00~21:00" value="${r.hours||''}" /></div>
  <div class="form-row"><label class="form-label">구글 지도 URL</label>
    <input class="form-input" id="f-mapurl" placeholder="https://maps.app.goo.gl/..." value="${r.mapUrl||''}" /></div>
  <div class="form-row"><label class="form-label">후기/메모</label>
    <textarea class="form-textarea" style="min-height:50px" id="f-review">${r.review||''}</textarea></div>
  <div class="form-row"><label class="form-label">태그 (쉼표로 구분)</label>
    <input class="form-input" id="f-tags" placeholder="오코노미야키, 웨이팅, 예약 권장" value="${(r.tags||[]).join(', ')}" /></div>
  `;
}

// ADD CATEGORY MODAL
function showAddCategoryModal() {
  modalMode = 'addCategory'; modalContext = {};
  showModal('카테고리 추가', `
  <div class="form-row"><label class="form-label">카테고리 이름 *</label>
    <input class="form-input" id="f-catname" placeholder="예: 면세·환급" /></div>
  `);
}

// SAVE MODAL
function saveModal() {
  if (modalMode === 'addTimeline' || modalMode === 'editTimeline') {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { alert('제목을 입력해주세요.'); return; }
    const mapUrl = document.getElementById('f-mapurl').value.trim();
    const coords = extractCoordsFromUrl(mapUrl);
    // 편집 시 기존 좌표 유지 (새 URL에 좌표 없으면)
    const {dayId, idx} = modalContext;
    const existing = modalMode === 'editTimeline' ? state.schedule[dayId].items[idx] : {};
    const item = {
      time: document.getElementById('f-time').value.trim(),
      type: document.getElementById('f-type').value,
      title,
      desc: document.getElementById('f-desc').value.trim(),
      tip:  document.getElementById('f-tip').value.trim(),
      mapUrl,
      lat: coords ? coords[0] : (existing.lat || null),
      lng: coords ? coords[1] : (existing.lng || null),
    };
    if (modalMode === 'addTimeline') state.schedule[dayId].items.push(item);
    else state.schedule[dayId].items[idx] = item;
  }
  else if (modalMode === 'addExpense' || modalMode === 'editExpense') {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { alert('내용을 입력해주세요.'); return; }
    const currency = document.getElementById('f-currency').value;
    const amountOrig = parseFloat(document.getElementById('f-amtval').value) || 0;
    let amountKrw, rateAtSave;
    if (currency === 'JPY') { rateAtSave = state.budget.exchangeRate; amountKrw = Math.round(amountOrig * rateAtSave); }
    else if (currency === 'USD') { rateAtSave = state.budget.usdRate; amountKrw = Math.round(amountOrig * rateAtSave); }
    else { rateAtSave = null; amountKrw = Math.round(amountOrig); }
    const entry = {
      id: 'b'+Date.now(),
      category: document.getElementById('f-cat').value,
      name, currency, amountOrig, amountKrw, rateAtSave,
      notes: document.getElementById('f-notes').value.trim(),
      paid: false,
    };
    if (modalMode === 'addExpense') state.budget.preset.push(entry);
    else { entry.id = state.budget.preset[modalContext.i].id; entry.paid = state.budget.preset[modalContext.i].paid; state.budget.preset[modalContext.i] = entry; }
  }
  else if (modalMode === 'addDaily' || modalMode === 'editDaily') {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { alert('내용을 입력해주세요.'); return; }
    const currency = document.getElementById('f-currency').value;
    const amountOrig = parseFloat(document.getElementById('f-amtval').value) || 0;
    const rateAtSave = currency === 'USD' ? state.budget.usdRate : state.budget.exchangeRate;
    const amountKrw = Math.round(amountOrig * rateAtSave);
    const entry = {
      day: document.getElementById('f-day').value,
      category: document.getElementById('f-cat').value,
      name, currency, amountOrig, amountKrw, rateAtSave,
      notes: document.getElementById('f-notes').value.trim(),
    };
    if (modalMode === 'addDaily') state.budget.daily.push(entry);
    else state.budget.daily[modalContext.i] = entry;
  }
  else if (modalMode === 'addRestaurant' || modalMode === 'editRestaurant') {
    const name = document.getElementById('f-rname').value.trim();
    if (!name) { alert('식당 이름을 입력해주세요.'); return; }
    const tagsRaw = document.getElementById('f-tags').value;
    const r = {
      id: modalMode==='editRestaurant' ? modalContext.id : 'r'+Date.now(),
      name, emoji: document.getElementById('f-emoji').value.trim()||'🍴',
      day: document.getElementById('f-rday').value,
      area: document.getElementById('f-rarea').value,
      menu: document.getElementById('f-menu').value.trim(),
      desc: document.getElementById('f-rdesc').value.trim(),
      hours: document.getElementById('f-hours').value.trim(),
      mapUrl: document.getElementById('f-mapurl').value.trim(),
      review: document.getElementById('f-review').value.trim(),
      tags: tagsRaw.split(',').map(t=>t.trim()).filter(Boolean),
      reel: false, featured: false,
      visited: modalMode==='editRestaurant' ? (state.restaurants.find(r=>r.id===modalContext.id)||{}).visited||false : false,
    };
    if (modalMode === 'addRestaurant') state.restaurants.push(r);
    else { const idx = state.restaurants.findIndex(r=>r.id===modalContext.id); if (idx>=0) state.restaurants[idx]=r; }
  }
  else if (modalMode === 'addCategory') {
    const catname = document.getElementById('f-catname').value.trim();
    if (!catname) { alert('카테고리 이름을 입력해주세요.'); return; }
    state.checklist.push({cat:catname, items:[]});
  }
  saveState();
  hideModal();
  renderMain();
}

// 모달 내 좌표 미리보기
function previewCoords(url) {
  const el = document.getElementById('coord-preview');
  if (!el) return;
  const coords = extractCoordsFromUrl(url);
  if (coords) {
    el.style.color = 'var(--green)';
    el.textContent = `✓ 좌표 인식: ${coords[0].toFixed(5)}, ${coords[1].toFixed(5)} — 저장 시 지도에 마커 추가됩니다`;
  } else if (url.trim()) {
    el.style.color = 'var(--amber)';
    el.textContent = '⚠ 좌표를 찾을 수 없습니다. maps.google.com 전체 URL(/@lat,lng 포함)을 사용해주세요';
  } else {
    el.style.color = 'var(--text3)';
    el.textContent = '전체 URL(maps.google.com/@lat,lng...)을 붙여넣으면 지도 마커가 추가됩니다';
  }
}

// ──────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────
loadState();
buildNav();
renderMain();
updateFab('overview');
// 앱 시작 시 실시간 환율 자동 조회 (마지막 업데이트가 1시간 이상 지났으면)
(function() {
  const last = state.budget.rateUpdated ? new Date(state.budget.rateUpdated) : null;
  const ONE_HOUR = 60 * 60 * 1000;
  if (!last || (Date.now() - last.getTime()) > ONE_HOUR) {
    fetchRates();
  }
})();
</script>
